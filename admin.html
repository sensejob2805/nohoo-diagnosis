<style>
:root{
  --forest:#1C3A2A;--forest-mid:#2D5A40;--forest-light:#E8F2EB;
  --gold:#C9A84C;--gold-light:#F5EDD6;
  --ink:#1A1A1A;--ink-mid:#4A4A4A;--ink-light:#8A8A8A;
  --line:#E8E8E8;--bg:#F5F4F1;--white:#FFFFFF;
  --good:#2E7D5A;--good-bg:#EAF5EE;--good-border:#A8D8BC;
  --warn:#B06000;--warn-bg:#FDF3E3;--warn-border:#F0C070;
  --danger:#B03030;--danger-bg:#FAEAEA;--danger-border:#F0A0A0;
  --r:10px;--r-lg:14px;
  --shadow:0 2px 12px rgba(0,0,0,0.08);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans KR','Apple SD Gothic Neo',sans-serif;background:var(--bg);color:var(--ink);font-size:14px;-webkit-font-smoothing:antialiased}

/* LOGIN */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(160deg,#122A1E,var(--forest))}
.login-box{background:var(--white);border-radius:20px;padding:3rem 2.5rem;width:100%;max-width:400px;box-shadow:0 8px 40px rgba(0,0,0,0.2);text-align:center}
.login-logo{width:56px;height:56px;background:var(--forest-light);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:24px;margin:0 auto 1.5rem}
.login-title{font-size:22px;font-weight:700;margin-bottom:.4rem}
.login-sub{font-size:14px;color:var(--ink-light);margin-bottom:2rem}
.login-input{width:100%;padding:14px 16px;border:1.5px solid var(--line);border-radius:var(--r);font-size:18px;text-align:center;letter-spacing:6px;outline:none;font-family:inherit}
.login-input:focus{border-color:var(--forest)}
.login-err{font-size:13px;color:var(--danger);margin-top:.5rem;min-height:20px}
.login-btn{width:100%;margin-top:1.25rem;padding:16px;background:var(--forest);color:var(--white);border:none;border-radius:var(--r);font-size:16px;font-weight:700;cursor:pointer;font-family:inherit}
.login-btn:hover{background:var(--forest-mid)}

/* LAYOUT */
.app{display:none;min-height:100vh}
.app.active{display:flex;flex-direction:column}
.topbar{background:var(--forest);padding:0 2rem;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,0.2)}
.topbar-left{display:flex;align-items:center;gap:12px}
.topbar-title{font-size:17px;font-weight:700;color:var(--white)}
.topbar-badge{font-size:11px;padding:3px 10px;border-radius:999px;background:rgba(201,168,76,.25);color:var(--gold);font-weight:500}
.topbar-right{display:flex;align-items:center;gap:10px}
.btn-sm{padding:7px 14px;border-radius:var(--r);font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;border:none;transition:opacity .15s}
.btn-sm:hover{opacity:.85}
.btn-refresh{background:rgba(255,255,255,.15);color:var(--white)}
.btn-csv{background:var(--gold);color:#1A1A00}
.btn-print{background:rgba(255,255,255,.15);color:var(--white)}
.btn-logout{background:rgba(255,255,255,.1);color:rgba(255,255,255,.7)}

.main{flex:1;padding:1.75rem 2rem;max-width:1400px;width:100%;margin:0 auto}

/* METRICS */
.metrics-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:1.75rem}
.metric-card{background:var(--white);border-radius:var(--r-lg);padding:1.25rem 1.5rem;box-shadow:var(--shadow);border:1px solid var(--line)}
.metric-label{font-size:12px;color:var(--ink-light);font-weight:500;letter-spacing:.3px;margin-bottom:.5rem}
.metric-value{font-size:32px;font-weight:900;letter-spacing:-1px;line-height:1}
.metric-sub{font-size:12px;color:var(--ink-light);margin-top:.3rem}

/* GRID */
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:1.75rem}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;margin-bottom:1.75rem}
.card{background:var(--white);border-radius:var(--r-lg);padding:1.5rem;box-shadow:var(--shadow);border:1px solid var(--line)}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem}
.card-title{font-size:15px;font-weight:700;color:var(--ink)}
.card-sub{font-size:12px;color:var(--ink-light);margin-top:2px}

/* HIGHLIGHTS */
.hl-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:1.75rem}
.hl-box{border-radius:var(--r-lg);padding:1.1rem 1.25rem;border:1px solid}

/* CHART */
.chart-wrap{position:relative;height:280px}

/* SCORE BARS */
.s-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.s-nm{font-size:13px;color:var(--ink-mid);flex:0 0 80px;font-weight:500}
.s-bar-bg{flex:1;height:8px;background:var(--line);border-radius:999px;overflow:hidden}
.s-bar{height:100%;border-radius:999px;transition:width .6s}
.s-val{font-size:14px;font-weight:700;width:28px;text-align:right}

/* QLIST */
.qlist-row{display:flex;gap:10px;align-items:flex-start;padding:10px 0;border-bottom:1px solid var(--line)}
.qlist-row:last-child{border-bottom:none}
.qlist-rank{font-size:13px;font-weight:900;width:20px;flex-shrink:0;padding-top:1px}
.qlist-txt{font-size:13px;line-height:1.5;flex:1;color:var(--ink);word-break:keep-all}
.qlist-meta{font-size:11px;color:var(--ink-light);margin-top:2px}
.qlist-score{font-size:15px;font-weight:700;flex-shrink:0}

/* TABLE */
.table-wrap{overflow-x:auto}
.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl th{background:#F0EFEc;padding:10px 14px;text-align:left;font-weight:700;color:var(--ink-mid);border-bottom:2px solid var(--line);white-space:nowrap;cursor:pointer;user-select:none}
.tbl th:hover{background:#E8E7E4}
.tbl th .sort-icon{margin-left:4px;opacity:.4}
.tbl th.asc .sort-icon::after{content:'▲'}
.tbl th.desc .sort-icon::after{content:'▼'}
.tbl th:not(.asc):not(.desc) .sort-icon::after{content:'⇅'}
.tbl td{padding:10px 14px;border-bottom:1px solid var(--line);vertical-align:middle}
.tbl tr:hover td{background:#FAFAF8}
.tbl tr:last-child td{border-bottom:none}
.score-pill{display:inline-block;padding:3px 10px;border-radius:999px;font-size:12px;font-weight:700}
.area-mini{display:flex;gap:4px;flex-wrap:wrap}
.area-dot-score{font-size:11px;padding:2px 6px;border-radius:4px;font-weight:600;white-space:nowrap}
.btn-detail{padding:5px 12px;border:1.5px solid var(--line);border-radius:6px;background:var(--white);cursor:pointer;font-size:12px;font-weight:600;color:var(--ink-mid);font-family:inherit}
.btn-detail:hover{border-color:var(--forest);color:var(--forest)}
.btn-del{padding:5px 10px;border:1.5px solid var(--danger-border);border-radius:6px;background:var(--white);cursor:pointer;font-size:12px;font-weight:600;color:var(--danger);font-family:inherit}
.btn-del:hover{background:var(--danger-bg)}

/* TOOLBAR */
.toolbar{display:flex;align-items:center;gap:10px;margin-bottom:1rem;flex-wrap:wrap}
.search-box{padding:8px 14px;border:1.5px solid var(--line);border-radius:var(--r);font-size:13px;outline:none;font-family:inherit;min-width:200px}
.search-box:focus{border-color:var(--forest)}
.sort-btn{padding:7px 14px;border:1.5px solid var(--line);border-radius:var(--r);background:var(--white);font-size:13px;cursor:pointer;font-family:inherit;font-weight:500}
.sort-btn.active{border-color:var(--forest);color:var(--forest);background:var(--forest-light)}
.count-badge{font-size:13px;color:var(--ink-light);margin-left:auto}

/* MODAL */
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:none;align-items:center;justify-content:center;padding:2rem}
.modal-ov.open{display:flex}
.modal{background:var(--white);border-radius:var(--r-lg);width:100%;max-width:680px;max-height:85vh;overflow-y:auto;box-shadow:0 8px 40px rgba(0,0,0,.2)}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:1.25rem 1.5rem;border-bottom:1px solid var(--line);position:sticky;top:0;background:var(--white);z-index:1}
.modal-title{font-size:17px;font-weight:700}
.modal-close{width:32px;height:32px;border:none;background:var(--line);border-radius:50%;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center}
.modal-body{padding:1.5rem}
.modal-score-hero{text-align:center;padding:1rem 0 1.5rem;border-bottom:1px solid var(--line);margin-bottom:1.5rem}
.modal-score-n{font-size:48px;font-weight:900;letter-spacing:-2px;line-height:1}
.modal-score-l{font-size:13px;color:var(--ink-light);margin-top:.3rem}
.modal-chart-wrap{height:240px;margin-bottom:1.5rem}
.detail-area-title{font-size:13px;font-weight:700;margin:12px 0 6px;padding-top:10px;border-top:1px solid var(--line)}
.detail-q-row{display:flex;gap:8px;align-items:flex-start;padding:7px 0;border-bottom:1px solid #F5F5F5}
.detail-q-row:last-child{border-bottom:none}
.detail-q-txt{font-size:12px;line-height:1.5;flex:1;color:var(--ink-mid);word-break:keep-all}
.detail-q-score{font-size:14px;font-weight:700;flex-shrink:0;min-width:30px;text-align:right}

/* PRINT */
@media print{
  .topbar,.toolbar,.btn-del,.btn-detail,.modal-ov{display:none!important}
  .app{display:block!important}
  .card{break-inside:avoid;box-shadow:none;border:1px solid #ddd}
  body{background:#fff}
}

/* TABS */
.tabs{display:flex;gap:4px;margin-bottom:1.75rem;background:var(--white);border-radius:var(--r-lg);padding:6px;box-shadow:var(--shadow);border:1px solid var(--line);width:fit-content}
.tab{padding:8px 20px;border-radius:var(--r);font-size:14px;font-weight:600;cursor:pointer;border:none;background:transparent;color:var(--ink-light);font-family:inherit;transition:all .15s}
.tab.active{background:var(--forest);color:var(--white)}
.tab-content{display:none}.tab-content.active{display:block}

.spin{width:32px;height:32px;border:2.5px solid var(--line);border-top-color:var(--forest);border-radius:50%;animation:sp .7s linear infinite;margin:3rem auto}
@keyframes sp{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:3rem;color:var(--ink-light);font-size:15px;line-height:1.7}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-wrap" id="loginWrap">
  <div class="login-box">
    <div class="login-logo">🔐</div>
    <div class="login-title">강사 전용 대시보드</div>
    <div class="login-sub">노후준비 진단 · 교육자 분석 화면</div>
    <input type="password" id="pwIn" class="login-input" placeholder="••••" maxlength="10" autocomplete="off">
    <div class="login-err" id="pwErr"></div>
    <button class="login-btn" onclick="checkLogin()">로그인</button>
  </div>
</div>

<!-- APP -->
<div class="app" id="appWrap">
  <!-- TOPBAR -->
  <div class="topbar">
    <div class="topbar-left">
      <div class="topbar-title">강사 대시보드</div>
      <div class="topbar-badge">노후준비 진단</div>
    </div>
    <div class="topbar-right">
      <button class="btn-sm btn-refresh" onclick="loadData()">🔄 새로고침</button>
      <button class="btn-sm btn-csv" onclick="exportCSV()">⬇ CSV 다운로드</button>
      <button class="btn-sm btn-print" onclick="window.print()">🖨️ 인쇄</button>
      <button class="btn-sm btn-logout" onclick="logout()">로그아웃</button>
    </div>
  </div>

  <div class="main" id="mainContent">
    <div class="spin"></div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-ov" id="modalOv" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle"></div>
      <button class="modal-close" onclick="document.getElementById('modalOv').classList.remove('open')">✕</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<script>
const ADMIN_PW='1234';
const AREAS=[
  {n:'변화관리',l:'가',c:'#2A5C45'},{n:'자산관리',l:'나',c:'#1A6B8A'},
  {n:'건강관리',l:'다',c:'#7B4F9E'},{n:'내 일 관리',l:'라',c:'#C0392B'},
  {n:'여가·취미',l:'마',c:'#E67E22'},{n:'삶의 균형',l:'바',c:'#27AE60'},
  {n:'관계관리',l:'사',c:'#2980B9'},{n:'주거·공간',l:'아',c:'#8E44AD'},
];
const QS_ORIG=[
  {a:0,id:0,t:'지금 하는 일을 그만두더라도 새로운 환경에 유연하게 적응할 수 있다.'},
  {a:0,id:1,t:'나 자신의 상태(몸·마음·관계)를 잘 파악하고 있다.'},
  {a:0,id:2,t:'내가 관심 있는 분야의 최신 정보와 변화를 꾸준히 파악하고 있다.'},
  {a:0,id:3,t:'새로운 흐름을 이해하고 다양한 세대와 소통하는 것이 어렵지 않다.'},
  {a:0,id:4,t:'나의 강점과 약점을 알고, 변화하는 상황에 맞게 대응할 수 있다.'},
  {a:1,id:5,t:'퇴직 후 소득 감소에 대비해 저축·투자·지출 계획을 세우고 있다.'},
  {a:1,id:6,t:'세금 제도와 정부 지원 정책을 이해하고 절세 방법에 관심을 갖고 있다.'},
  {a:1,id:7,t:'노후에 필요한 생활비와 자산 규모를 대략적으로 파악하고 있다.'},
  {a:1,id:8,t:'퇴직 후에도 안정적인 생활이 가능한 수준의 재원이 마련되어 있다.'},
  {a:1,id:9,t:'부동산·금융·연금 등 자산을 다양하게 나눠 관리하고 있다.'},
  {a:2,id:10,t:'건강 관련 정보를 챙기고 균형 잡힌 식생활을 실천하고 있다.'},
  {a:2,id:11,t:'건강 유지를 위해 꾸준히 운동이나 신체 활동을 하고 있다.'},
  {a:2,id:12,t:'나이 드는 것을 자연스럽게 받아들이고 노화에 대비하고 있다.'},
  {a:2,id:13,t:'향후 의료비와 건강 유지에 필요한 비용을 준비하고 있다.'},
  {a:2,id:14,t:'마음 건강의 중요성을 인식하고 스트레스와 감정을 관리하고 있다.'},

  {a:3,id:16,t:'내 경험과 지식을 다른 사람과 나누거나 가르칠 수 있다.'},
  {a:3,id:17,t:'현재 역량을 유지·발전시키기 위한 학습이나 교육에 참여하고 있다.'},

  {a:3,id:19,t:'나만의 전문 분야나 강점이 무엇인지 명확히 알고 있다.'},
  {a:4,id:20,t:'즐기고 있거나 새롭게 시작하고 싶은 취미·여가 활동이 있다.'},
  {a:4,id:21,t:'취미나 여가 활동을 더 발전시키면 의미 있는 역할로 연결될 것 같다.'},
  {a:4,id:22,t:'여가나 취미를 함께 즐길 수 있는 사람이 주변에 있다.'},
  {a:4,id:23,t:'여가나 취미 활동을 통해 스트레스가 해소되고 삶의 활력을 느끼고 있다.'},
  {a:4,id:24,t:'취미·여가를 위한 시간과 비용을 따로 마련해 두고 있다.'},

  {a:6,id:33,t:'힘들거나 어려울 때 솔직하게 마음을 털어놓을 수 있는 사람이 있다.'},

  {a:7,id:36,t:'편안하게 쉬고 집중할 수 있는 나만의 공간이 있다.'},
  {a:7,id:37,t:'앞으로의 생활 변화(독립·이사·건강 등)에 맞는 주거 방향을 생각해 두고 있다.'},
  {a:7,id:38,t:'주거 환경 변화(이사·수리 등)가 생겨도 유연하게 대처할 수 있다.'},
  {a:7,id:39,t:'생활공간이 내 건강과 행복에 미치는 영향을 인식하고 관리하고 있다.'},
];

let allData=[];
let sortKey='ts';let sortDir='desc';let searchStr='';
let radarChart=null;let detailChart=null;

function sc(s){return s>=4?'#2E7D5A':s>=3?'#B06000':'#B03030';}
function scBg(s){return s>=4?'#EAF5EE':s>=3?'#FDF3E3':'#FAEAEA';}
function scBorder(s){return s>=4?'#A8D8BC':s>=3?'#F0C070':'#F0A0A0';}

// LOGIN
function checkLogin(){
  if(document.getElementById('pwIn').value===ADMIN_PW){
    document.getElementById('loginWrap').style.display='none';
    document.getElementById('appWrap').classList.add('active');
    loadData();
  } else {
    document.getElementById('pwErr').textContent='비밀번호가 틀렸습니다.';
  }
}
document.addEventListener('keydown',e=>{
  if(e.key==='Enter'&&document.getElementById('loginWrap').style.display!=='none') checkLogin();
});
function logout(){
  document.getElementById('loginWrap').style.display='flex';
  document.getElementById('appWrap').classList.remove('active');
  document.getElementById('pwIn').value='';
}

// LOAD DATA
async function loadData(){
  const main=document.getElementById('mainContent');
  main.innerHTML='<div class="spin"></div>';
  allData=[];
  try{
    if(window._fbReady){
      const snap=await window._getDocs(window._collection(window._db,'results'));
      snap.forEach(d=>allData.push({...d.data(),_docId:d.id}));
      allData.sort((a,b)=>(b.ts||0)-(a.ts||0));
    }
  }catch(e){main.innerHTML='<div class="empty">데이터 로드 오류: '+e.message+'</div>';return;}
  if(!allData.length){main.innerHTML='<div class="empty">아직 저장된 결과가 없습니다.<br>교육생들이 진단을 완료하고 저장하면 여기에 표시됩니다.</div>';return;}
  renderDashboard();
}

function renderDashboard(){
  const grp=AREAS.map((_,i)=>+(allData.reduce((s,r)=>s+r.scores[i],0)/allData.length).toFixed(1));
  const oa=+(grp.reduce((a,b)=>a+b,0)/8).toFixed(1);
  const maxIdx=grp.indexOf(Math.max(...grp));
  const minIdx=grp.indexOf(Math.min(...grp));
  const qAvg=QS_ORIG.map(q=>{
    const v=allData.filter(r=>r.qScores&&r.qScores[q.id]>0).map(r=>r.qScores[q.id]);
    return v.length?+(v.reduce((a,b)=>a+b,0)/v.length).toFixed(1):null;
  });
  const qWithAvg=QS_ORIG.map((q,i)=>({...q,avg:qAvg[i]})).filter(q=>q.avg!==null);
  const qSorted=[...qWithAvg].sort((a,b)=>a.avg-b.avg);
  const bottom5=qSorted.slice(0,5);
  const top5=[...qSorted].reverse().slice(0,5);

  let h='';

  // METRICS
  const scores=allData.map(r=>r.total);
  const maxScore=Math.max(...scores);
  const minScore=Math.min(...scores);
  h+=`<div class="metrics-row">
    <div class="metric-card">
      <div class="metric-label">총 응답자</div>
      <div class="metric-value" style="color:var(--forest)">${allData.length}명</div>
      <div class="metric-sub">전체 교육생</div>
    </div>
    <div class="metric-card">
      <div class="metric-label">전체 평균</div>
      <div class="metric-value" style="color:${sc(oa)}">${oa}</div>
      <div class="metric-sub">5점 만점 기준</div>
    </div>
    <div class="metric-card">
      <div class="metric-label">최고 점수</div>
      <div class="metric-value" style="color:var(--good)">${maxScore}</div>
      <div class="metric-sub">${allData.find(r=>r.total===maxScore)?.name||''}</div>
    </div>
    <div class="metric-card">
      <div class="metric-label">최저 점수</div>
      <div class="metric-value" style="color:var(--danger)">${minScore}</div>
      <div class="metric-sub">${allData.find(r=>r.total===minScore)?.name||''}</div>
    </div>
  </div>`;

  // TABS
  h+=`<div class="tabs">
    <button class="tab active" onclick="switchTab('overview')">📊 전체 현황</button>
    <button class="tab" onclick="switchTab('detail')">👥 응답자 목록</button>
    <button class="tab" onclick="switchTab('analysis')">🔍 문항 분석</button>
  </div>`;

  // TAB: OVERVIEW
  h+=`<div class="tab-content active" id="tab-overview">
    <div class="hl-row">
      <div class="hl-box" style="background:var(--good-bg);border-color:var(--good-border)">
        <div style="font-size:12px;font-weight:700;color:var(--good);margin-bottom:6px">✅ 가장 강한 영역</div>
        <div style="font-size:20px;font-weight:700;color:var(--good)">${AREAS[maxIdx].l}. ${AREAS[maxIdx].n}</div>
        <div style="font-size:13px;color:var(--good);margin-top:3px">그룹 평균 ${grp[maxIdx]}점</div>
      </div>
      <div class="hl-box" style="background:var(--danger-bg);border-color:var(--danger-border)">
        <div style="font-size:12px;font-weight:700;color:var(--danger);margin-bottom:6px">🔴 가장 취약한 영역</div>
        <div style="font-size:20px;font-weight:700;color:var(--danger)">${AREAS[minIdx].l}. ${AREAS[minIdx].n}</div>
        <div style="font-size:13px;color:var(--danger);margin-top:3px">그룹 평균 ${grp[minIdx]}점</div>
      </div>
    </div>
    <div class="grid-2">
      <div class="card">
        <div class="card-header"><div><div class="card-title">그룹 레이더 차트</div><div class="card-sub">전체 응답자 영역별 평균</div></div></div>
        <div class="chart-wrap"><canvas id="radarC"></canvas></div>
      </div>
      <div class="card">
        <div class="card-header"><div><div class="card-title">영역별 평균 점수</div><div class="card-sub">8개 영역 5점 만점</div></div></div>
        ${grp.map((s,i)=>`<div class="s-row"><span class="s-nm">${AREAS[i].l}. ${AREAS[i].n}</span><div class="s-bar-bg"><div class="s-bar" style="width:${s/5*100}%;background:${sc(s)}"></div></div><span class="s-val" style="color:${sc(s)}">${s}</span></div>`).join('')}
      </div>
    </div>
    <div class="grid-2">
      <div class="card">
        <div class="card-header"><div><div class="card-title">🔴 집중 보완 문항 TOP 5</div><div class="card-sub">평균이 가장 낮은 문항 — 수업 집중 다루기 권장</div></div></div>
        ${bottom5.map((q,i)=>`<div class="qlist-row"><div class="qlist-rank" style="color:${sc(q.avg)}">${i+1}</div><div style="flex:1"><div class="qlist-txt">${q.t}</div><div class="qlist-meta">${AREAS[q.a].l}. ${AREAS[q.a].n}</div></div><div class="qlist-score" style="color:${sc(q.avg)}">${q.avg}</div></div>`).join('')}
      </div>
      <div class="card">
        <div class="card-header"><div><div class="card-title">✅ 강점 문항 TOP 5</div><div class="card-sub">평균이 가장 높은 문항</div></div></div>
        ${top5.map((q,i)=>`<div class="qlist-row"><div class="qlist-rank" style="color:${sc(q.avg)}">${i+1}</div><div style="flex:1"><div class="qlist-txt">${q.t}</div><div class="qlist-meta">${AREAS[q.a].l}. ${AREAS[q.a].n}</div></div><div class="qlist-score" style="color:${sc(q.avg)}">${q.avg}</div></div>`).join('')}
      </div>
    </div>
  </div>`;

  // TAB: DETAIL TABLE
  h+=`<div class="tab-content" id="tab-detail">
    <div class="card">
      <div class="toolbar">
        <input type="text" class="search-box" id="searchInput" placeholder="이름 검색..." oninput="filterTable()" value="${searchStr}">
        <button class="sort-btn ${sortKey==='total'&&sortDir==='desc'?'active':''}" onclick="setSortTable('total','desc')">점수 높은순</button>
        <button class="sort-btn ${sortKey==='total'&&sortDir==='asc'?'active':''}" onclick="setSortTable('total','asc')">점수 낮은순</button>
        <button class="sort-btn ${sortKey==='name'&&sortDir==='asc'?'active':''}" onclick="setSortTable('name','asc')">이름순</button>
        <button class="sort-btn ${sortKey==='ts'&&sortDir==='desc'?'active':''}" onclick="setSortTable('ts','desc')">최신순</button>
        <div class="count-badge" id="countBadge"></div>
      </div>
      <div class="table-wrap">
        <table class="tbl" id="respTable">
          <thead>
            <tr>
              <th>이름</th>
              <th>진단 일시</th>
              <th>종합 평균</th>
              ${AREAS.map(a=>`<th>${a.l}.${a.n}</th>`).join('')}
              <th>상세</th>
              <th>삭제</th>
            </tr>
          </thead>
          <tbody id="respTbody"></tbody>
        </table>
      </div>
    </div>
  </div>`;

  // TAB: ANALYSIS
  h+=`<div class="tab-content" id="tab-analysis">
    <div class="card" style="margin-bottom:14px">
      <div class="card-header"><div><div class="card-title">영역별 문항 상세 분석</div><div class="card-sub">영역을 선택하면 해당 영역 5개 문항의 그룹 평균을 확인할 수 있어요</div></div></div>
      <div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:1.25rem" id="areaTabs2">
        ${AREAS.map((ar,i)=>`<button onclick="selectAreaTab2(${i})" id="atab2-${i}" style="padding:7px 14px;border-radius:999px;font-size:13px;font-weight:700;border:1.5px solid ${ar.c}55;cursor:pointer;background:white;color:${ar.c};font-family:inherit">${ar.l}. ${ar.n}</button>`).join('')}
      </div>
      <div id="areaQDetail2"></div>
    </div>
    <div class="card">
      <div class="card-header"><div><div class="card-title">전체 40문항 평균 순위</div><div class="card-sub">낮은 점수순 정렬</div></div></div>
      <div class="table-wrap">
        <table class="tbl">
          <thead><tr><th>순위</th><th>문항 내용</th><th>영역</th><th>평균 점수</th></tr></thead>
          <tbody>
            ${qSorted.map((q,i)=>`<tr><td style="font-weight:700;color:${sc(q.avg)}">${i+1}</td><td style="max-width:400px">${q.t}</td><td><span style="font-size:12px;padding:2px 8px;border-radius:999px;background:${AREAS[q.a].c}20;color:${AREAS[q.a].c};font-weight:600">${AREAS[q.a].l}. ${AREAS[q.a].n}</span></td><td><span class="score-pill" style="background:${scBg(q.avg)};color:${sc(q.avg)}">${q.avg}점</span></td></tr>`).join('')}
          </tbody>
        </table>
      </div>
    </div>
  </div>`;

  document.getElementById('mainContent').innerHTML=h;

  // Draw radar
  setTimeout(()=>{
    if(radarChart)radarChart.destroy();
    radarChart=new Chart(document.getElementById('radarC').getContext('2d'),{
      type:'radar',
      data:{labels:AREAS.map(a=>a.l+'.'+a.n),datasets:[{data:grp,borderColor:'#1C3A2A',backgroundColor:'rgba(28,58,42,0.08)',borderWidth:2,pointBackgroundColor:grp.map(s=>sc(s)),pointRadius:5}]},
      options:{responsive:true,maintainAspectRatio:false,scales:{r:{min:0,max:5,ticks:{stepSize:1,font:{size:10},backdropColor:'transparent',color:'#9CA3AF'},grid:{color:'rgba(0,0,0,0.06)'},pointLabels:{font:{size:11,weight:'600'},color:'#4A4A4A',padding:8},angleLines:{color:'rgba(0,0,0,0.06)'}}},plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>c.raw+'점'}}}}
    });
    renderTable();
    selectAreaTab2(0);
  },80);

  window._qAvg=qAvg;
}

// TABLE
function renderTable(){
  let data=[...allData];
  if(searchStr) data=data.filter(r=>r.name.includes(searchStr));
  data.sort((a,b)=>{
    if(sortKey==='name') return sortDir==='asc'?a.name.localeCompare(b.name):b.name.localeCompare(a.name);
    if(sortKey==='total') return sortDir==='asc'?a.total-b.total:b.total-a.total;
    return sortDir==='asc'?(a.ts||0)-(b.ts||0):(b.ts||0)-(a.ts||0);
  });
  const tbody=document.getElementById('respTbody');
  const badge=document.getElementById('countBadge');
  if(badge) badge.textContent=`총 ${data.length}명`;
  if(!tbody)return;
  tbody.innerHTML=data.map((r,i)=>{
    const orig=allData.indexOf(r);
    return `<tr>
      <td style="font-weight:700">${r.name}</td>
      <td style="color:var(--ink-light)">${r.date}</td>
      <td><span class="score-pill" style="background:${scBg(r.total)};color:${sc(r.total)}">${r.total}점</span></td>
      ${r.scores.map(s=>`<td style="color:${sc(s)};font-weight:600;text-align:center">${s}</td>`).join('')}
      <td><button class="btn-detail" onclick="showDetail(${allData.indexOf(r)})">상세</button></td>
      <td><button class="btn-del" onclick="deleteResult('${r._docId||r.name}','${r.name}')">삭제</button></td>
    </tr>`;
  }).join('');
}

function filterTable(){
  searchStr=document.getElementById('searchInput')?.value||'';
  renderTable();
}
function setSortTable(key,dir){
  sortKey=key;sortDir=dir;
  document.querySelectorAll('.sort-btn').forEach(b=>b.classList.remove('active'));
  renderTable();
  // re-highlight active sort btn
  document.querySelectorAll('.sort-btn').forEach(b=>{
    const txt=b.textContent;
    if((key==='total'&&dir==='desc'&&txt.includes('높은'))||(key==='total'&&dir==='asc'&&txt.includes('낮은'))||(key==='name'&&txt.includes('이름'))||(key==='ts'&&txt.includes('최신')))
      b.classList.add('active');
  });
}

// TABS
function switchTab(id){
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
  document.getElementById('tab-'+id)?.classList.add('active');
  const tabIdx={'overview':0,'detail':1,'analysis':2}[id];
  document.querySelectorAll('.tab')[tabIdx]?.classList.add('active');
  if(id==='detail') renderTable();
}

// AREA ANALYSIS TAB
function selectAreaTab2(idx){
  AREAS.forEach((ar,i)=>{
    const t=document.getElementById('atab2-'+i);
    if(!t)return;
    if(i===idx){t.style.background=ar.c;t.style.color='#fff';t.style.borderColor=ar.c;}
    else{t.style.background='#fff';t.style.color=ar.c;t.style.borderColor=ar.c+'55';}
  });
  const el=document.getElementById('areaQDetail2');
  if(!el)return;
  const qAvg=window._qAvg||[];
  const qs=QS_ORIG.filter(q=>q.a===idx).sort((a,b)=>(qAvg[a.id]||0)-(qAvg[b.id]||0));
  el.innerHTML=`<table class="tbl"><thead><tr><th>문항 내용</th><th style="width:120px">그룹 평균</th></tr></thead><tbody>`+
    qs.map(q=>{
      const avg=qAvg[q.id];if(avg===null)return'';
      return`<tr><td style="word-break:keep-all">${q.t}</td><td><div style="display:flex;align-items:center;gap:8px"><div style="flex:1;height:7px;background:var(--line);border-radius:999px;overflow:hidden"><div style="width:${avg/5*100}%;height:100%;background:${sc(avg)};border-radius:999px"></div></div><span style="font-size:14px;font-weight:700;color:${sc(avg)};width:28px;text-align:right">${avg}</span></div></td></tr>`;
    }).join('')+
  `</tbody></table>`;
}

// DETAIL MODAL
function showDetail(idx){
  const r=allData[idx];if(!r)return;
  document.getElementById('modalTitle').textContent=r.name+'님 상세 결과';
  let b=`<div class="modal-score-hero">
    <div style="font-size:13px;color:var(--ink-light)">${r.date}</div>
    <div class="modal-score-n" style="color:${sc(r.total)}">${r.total}</div>
    <div class="modal-score-l">종합 평균 (5점 만점)</div>
  </div>
  <div class="modal-chart-wrap"><canvas id="detailC"></canvas></div>`;
  r.scores.forEach((s,i)=>{const c=sc(s);b+=`<div class="s-row"><span class="s-nm">${AREAS[i].l}. ${AREAS[i].n}</span><div class="s-bar-bg"><div class="s-bar" style="width:${s/5*100}%;background:${c}"></div></div><span class="s-val" style="color:${c}">${s}</span></div>`;});
  if(r.qScores){
    b+=`<div style="margin-top:1.5rem;font-size:15px;font-weight:700;margin-bottom:1rem">문항별 응답 상세</div>`;
    AREAS.forEach((ar,ai)=>{
      b+=`<div class="detail-area-title" style="color:${ar.c}">${ar.l}. ${ar.n}</div>`;
      QS_ORIG.filter(q=>q.a===ai).forEach(q=>{
        const v=r.qScores[q.id]||0;const c=sc(v);
        b+=`<div class="detail-q-row"><div class="detail-q-txt">${q.t}</div><div class="detail-q-score" style="color:${c}">${v}점</div></div>`;
      });
    });
  }
  document.getElementById('modalBody').innerHTML=b;
  document.getElementById('modalOv').classList.add('open');
  setTimeout(()=>{
    if(detailChart)detailChart.destroy();
    detailChart=new Chart(document.getElementById('detailC').getContext('2d'),{
      type:'radar',
      data:{labels:AREAS.map(a=>a.l+'.'+a.n),datasets:[{data:r.scores,borderColor:'#1C3A2A',backgroundColor:'rgba(28,58,42,0.08)',borderWidth:2,pointBackgroundColor:r.scores.map(s=>sc(s)),pointRadius:5}]},
      options:{responsive:true,maintainAspectRatio:false,scales:{r:{min:0,max:5,ticks:{stepSize:1,font:{size:10},backdropColor:'transparent',color:'#9CA3AF'},grid:{color:'rgba(0,0,0,0.06)'},pointLabels:{font:{size:10,weight:'600'},color:'#4A4A4A'},angleLines:{color:'rgba(0,0,0,0.06)'}}},plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>c.raw+'점'}}}}
    });
  },80);
}
function closeModal(e){if(e.target===document.getElementById('modalOv'))document.getElementById('modalOv').classList.remove('open');}

// DELETE
async function deleteResult(docId,name){
  if(!confirm(`"${name}"님의 결과를 삭제하시겠습니까?`))return;
  try{
    await window._deleteDoc(window._doc(window._db,'results',docId));
    allData=allData.filter(r=>(r._docId||r.name)!==docId);
    renderDashboard();
  }catch(e){alert('삭제 오류: '+e.message);}
}

// CSV EXPORT
function exportCSV(){
  if(!allData.length){alert('데이터가 없습니다.');return;}
  const headers=['이름','진단일시','종합평균',...AREAS.map(a=>a.l+'.'+a.n),...QS_ORIG.map(q=>'Q'+String(q.id+1).padStart(2,'0'))];
  const rows=allData.map(r=>[
    r.name, r.date, r.total,
    ...r.scores,
    ...(r.qScores?QS_ORIG.map(q=>r.qScores[q.id]||0):new Array(40).fill(''))
  ]);
  const csv='\uFEFF'+[headers,...rows].map(row=>row.map(v=>'"'+String(v).replace(/"/g,'""')+'"').join(',')).join('\n');
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download='노후준비진단_결과_'+new Date().toLocaleDateString('ko-KR').replace(/\./g,'').replace(/ /g,'')+'.csv';
  a.click();URL.revokeObjectURL(url);
}
